<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="現調台帳">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="save.css">
<title>現調台帳</title>
</head>
<body>
<header><div class="headTop"><h1>現調台帳</h1><button class="primary saveButton noPrint" onclick="manualSave()">保存</button><div id="currentSitePill" class="sitePill">現場未選択</div></div><div class="tabs noPrint"><button id="tab-sites" onclick="showView('sites')">現場</button><button id="tab-items" onclick="showView('items')">項目</button><button id="tab-measure" onclick="showView('measure')">実測</button><button id="tab-result" onclick="showView('result')">結果</button><button id="tab-tools" onclick="showView('tools')">保管</button></div></header>
<main>
<section id="view-sites" class="view active"><div class="card"><h2><span class="num">1</span>現場名登録</h2><div class="grid"><div><label>現場名</label><input id="siteName" placeholder="例：〇〇様邸 外壁改修"></div><div class="row"><div><label>現調日</label><input id="siteDate" type="date"></div><div><label>担当者</label><input id="siteStaff" placeholder="例：山﨑"></div></div><div><label>住所・補足</label><input id="siteAddress" placeholder="住所、元請、連絡先など"></div><div><label>現場メモ</label><textarea id="siteMemo" placeholder="駐車位置、注意点、顧客要望など"></textarea></div><div class="btnRow"><button id="siteSubmit" class="primary" onclick="submitSite()">この現場を登録</button><button onclick="clearSiteForm()">入力クリア</button></div></div></div><div class="card flat"><h2><span class="num">2</span>現場参照</h2><div class="toolbar"><input id="siteSearch" placeholder="現場名検索" oninput="renderSites()"><button class="blue" onclick="showView('tools')">バックアップ</button></div><div id="siteList" class="list"></div></div></section>
<section id="view-items" class="view"><div class="card"><h2><span class="num">1</span>項目作成</h2><div id="noSiteItems" class="empty hidden">先に現場を選択してください</div><div id="itemForm" class="grid"><div><label>項目名</label><input id="itemName" placeholder="例：外壁塗装、シーリング、鉄部階段"></div><div class="row"><div><label>単位</label><select id="itemUnit"><option>㎡</option><option>m</option><option>箇所</option><option>枚</option><option>式</option></select></div><div><label>分類</label><input id="itemGroup" placeholder="任意：外壁、防水、鉄部など"></div></div><div><label>項目メモ</label><textarea id="itemMemo" placeholder="仕様候補、注意点、測定ルールなど"></textarea></div><div class="btnRow"><button id="itemSubmit" class="primary" onclick="submitItem()">項目を登録</button><button onclick="clearItemForm()">入力クリア</button><button class="blue" onclick="addDefaultTemplates()">定番項目追加</button></div></div></div><div class="card flat"><h2><span class="num">2</span>登録項目</h2><div class="toolbar"><input id="itemSearch" placeholder="項目名・分類検索" oninput="renderItems();renderMeasure()"><select id="groupFilter" onchange="renderItems();renderMeasure()"><option value="">分類すべて</option></select></div><div id="itemList" class="list"></div></div></section>
<section id="view-measure" class="view"><div class="card measurePanel"><h2><span class="num">1</span>実測開始</h2><div id="noSiteMeasure" class="empty hidden">先に現場を選択してください</div><div id="measureForm" class="grid"><div class="row"><div><label>登録済み項目から選択</label><select id="measureItem" onchange="onMeasureItemChange()"></select></div><div><label>無ければその場で作成</label><button class="blue" onclick="quickCreateItem()">項目作成</button></div></div><div id="selectedUnit" class="badge unit">単位：-</div>
<div id="areaFields" class="grid hidden"><div><label>㎡の計算方法</label><select id="areaMode" onchange="onAreaModeChange();calcLive()"><option value="flat">縦・高さ × 横・幅</option><option value="face">長さ × 高さ</option><option value="floor">長さ × 奥行き</option><option value="around">四周：（長さ＋奥行き）×2×高さ</option></select></div><div id="areaFlatFields" class="row3"><div><label>縦・高さ</label><input id="areaH" type="number" step="0.001" inputmode="decimal" placeholder="m"></div><div><label>横・幅</label><input id="areaW" type="number" step="0.001" inputmode="decimal" placeholder="m"></div><div><label>同寸法</label><select id="areaQ"><option value="1">×1</option><option value="2">×2</option><option value="3">×3</option><option value="4">×4</option><option value="5">×5</option><option value="6">×6</option><option value="7">×7</option><option value="8">×8</option><option value="9">×9</option></select></div></div><div id="area3dFields" class="row4 hidden"><div><label>長さ</label><input id="areaL" type="number" step="0.001" inputmode="decimal" placeholder="m"></div><div><label>高さ</label><input id="areaHeight" type="number" step="0.001" inputmode="decimal" placeholder="m"></div><div><label>奥行き</label><input id="areaDepth" type="number" step="0.001" inputmode="decimal" placeholder="m"></div><div><label>同寸法</label><select id="areaSame3d"><option value="1">×1</option><option value="2">×2</option><option value="3">×3</option><option value="4">×4</option><option value="5">×5</option><option value="6">×6</option><option value="7">×7</option><option value="8">×8</option><option value="9">×9</option></select></div></div><div id="areaModeHint" class="calcHint">式：縦・高さ × 横・幅 × 同寸法数 − 控除</div><div><label>開口・控除</label><div id="areaDeductions" class="deductions"></div><div class="btnRow noPrint"><button class="miniBtn blue" onclick="addDeduction('㎡')">控除追加</button><button class="miniBtn" onclick="clearDeductions()">控除クリア</button></div></div></div>
<div id="lenFields" class="grid hidden"><div class="row3"><div><label>長さ</label><input id="lenL" type="number" step="0.001" inputmode="decimal" placeholder="m"></div><div><label>同寸法</label><select id="lenQ"><option value="1">×1</option><option value="2">×2</option><option value="3">×3</option><option value="4">×4</option><option value="5">×5</option><option value="6">×6</option><option value="7">×7</option><option value="8">×8</option><option value="9">×9</option></select></div><div><label>控除m</label><input id="lenD" type="number" step="0.001" inputmode="decimal" placeholder="0"></div></div><div><label>開口・控除メモ</label><textarea id="lenDeductMemo" placeholder="例：開口部、施工対象外、重複分など"></textarea></div></div>
<div id="qtyFields" class="grid hidden"><div><label>数量</label><input id="qtyValue" type="number" step="0.001" inputmode="decimal" value="1"></div></div><div><label>写真 任意・自動圧縮</label><input id="entryPhotos" type="file" accept="image/*" capture="environment" multiple onchange="previewEntryPhotos(this)"><div class="hint">写真は長辺1600px目安・JPEG圧縮して保存します。</div><div id="entryPhotoPreview" class="photoGrid"></div></div><div><label>実測メモ</label><textarea id="entryMemo" placeholder="実測根拠、レーザー/スケール、開口内容、再確認事項など"></textarea></div><div class="card flat"><div>今回数量：<span id="liveQty" class="total">0.00</span> <span id="liveUnit"></span></div><div id="liveFormula" class="hint"></div></div><div class="btnRow"><button id="entrySubmit" class="primary" onclick="submitEntry(false)">登録</button><button class="ok" onclick="submitEntry(true)">登録して続けて入力</button><button onclick="clearMeasureInputs(false)">入力クリア</button></div></div></div><div class="card flat"><h2><span class="num">2</span>実測履歴</h2><div class="btnRow noPrint"><button class="blue" onclick="toggleHistory()">履歴 折りたたみ/展開</button></div><div id="entryList" class="list"></div></div></section>
<section id="view-result" class="view"><div class="card"><h2><span class="num">1</span>現調結果</h2><div id="resultSummary" class="summaryGrid"></div><div class="btnRow noPrint" style="margin-top:10px"><button class="blue" onclick="copyResultText()">結果をコピー</button><button class="blue" onclick="exportCsv()">CSV出力</button><button onclick="window.print()">PDF保存</button><button class="danger" onclick="deleteCurrentSite()">この現場データ削除</button></div></div><div class="card flat"><h2><span class="num">2</span>項目別合計</h2><div id="resultList" class="list"></div></div></section>
<section id="view-tools" class="view"><div class="card"><h2><span class="num">1</span>保管・復元</h2><div class="grid"><div class="btnRow"><button class="primary" onclick="exportCurrentSiteJson()">選択現場をバックアップ</button><button class="blue" onclick="exportAllJson()">全現場バックアップ</button><button onclick="importJsonClick()">復元</button></div><input id="jsonIn" class="hidden" type="file" accept="application/json" onchange="importJson(this)"><div class="hint">復元時にIDを自動で振り直し、既存データとの重複を防ぎます。</div></div></div><div class="card flat"><h2><span class="num">2</span>項目テンプレート</h2><div class="grid"><div class="btnRow"><button class="blue" onclick="addDefaultTemplates()">選択現場へ定番項目追加</button><button onclick="saveCurrentItemsAsTemplate()">現場項目をテンプレ保存</button><button onclick="applySavedTemplate()">保存テンプレ適用</button></div><div id="templateList" class="list"></div></div></div></section>
</main><div id="saveToast" aria-live="polite"></div><div class="footer noPrint" id="footerBar"></div><script src="app.js"></script><script src="save.js"></script><script src="common-items.js"></script></body></html>
